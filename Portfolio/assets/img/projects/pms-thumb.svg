<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="PMS Kanboard-based hiring workflow thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .t{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#e5e7eb}
      .muted{fill:#9ca3af}
      .chip{fill:#0b1220; stroke:#27324a; stroke-width:2}
      .card{fill:#0b1220; stroke:#27324a; stroke-width:2}
      .k{fill:#22c55e}
      .b{fill:#60a5fa}
      .y{fill:#fbbf24}
      .p{fill:#a78bfa}
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <path d="M-50 180 C 250 40, 520 60, 780 160 C 980 240, 1140 210, 1250 140 L 1250 -50 L -50 -50 Z" fill="url(#glow)"/>

  <!-- Header -->
  <g transform="translate(84,86)">
    <text class="t" x="0" y="0" font-size="58" font-weight="800" dominant-baseline="hanging">PMS</text>
    <text class="t muted" x="0" y="78" font-size="24" font-weight="600" dominant-baseline="hanging">Kanboard-based project + hiring workflow system</text>

    <g transform="translate(0,128)">
      <rect class="chip" x="0" y="0" rx="14" ry="14" width="152" height="46"/>
      <text class="t" x="18" y="29" font-size="18" font-weight="700">PHP</text>
      <circle class="k" cx="124" cy="23" r="7"/>

      <rect class="chip" x="168" y="0" rx="14" ry="14" width="170" height="46"/>
      <text class="t" x="186" y="29" font-size="18" font-weight="700">MySQL</text>
      <circle class="b" cx="312" cy="23" r="7"/>

      <rect class="chip" x="354" y="0" rx="14" ry="14" width="204" height="46"/>
      <text class="t" x="372" y="29" font-size="18" font-weight="700">JSON-RPC</text>
      <circle class="p" cx="532" cy="23" r="7"/>

      <rect class="chip" x="574" y="0" rx="14" ry="14" width="228" height="46"/>
      <text class="t" x="592" y="29" font-size="18" font-weight="700">OAuth + Webhooks</text>
      <circle class="y" cx="780" cy="23" r="7"/>
    </g>
  </g>

  <!-- Kanban board -->
  <g filter="url(#shadow)" transform="translate(84,270)">
    <rect x="0" y="0" rx="18" ry="18" width="1032" height="560" fill="#070b14" stroke="#1f2a44" stroke-width="2"/>
    <rect x="0" y="0" rx="18" ry="18" width="1032" height="76" fill="#0b1220"/>

    <text class="t" x="28" y="46" font-size="20" font-weight="800">Hiring Board</text>
    <text class="t muted" x="172" y="46" font-size="16" font-weight="700">Interviews • Artifacts • Notifications</text>

    <!-- Columns -->
    <g transform="translate(24,104)">
      <g>
        <text class="t muted" x="0" y="0" font-size="14" font-weight="800" dominant-baseline="hanging">Screening</text>
        <rect x="0" y="30" rx="16" ry="16" width="318" height="404" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>
        <g transform="translate(16,54)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="88"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">Backend Engineer</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">Round 0 • CV review</text>
          <rect x="206" y="18" rx="10" ry="10" width="64" height="24" fill="#0f1a2f" stroke="#27324a" stroke-width="2"/>
          <text class="t" x="218" y="36" font-size="12" font-weight="800">PHP</text>
        </g>
        <g transform="translate(16,154)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="88"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">Frontend Engineer</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">Round 0 • Portfolio</text>
          <rect x="182" y="18" rx="10" ry="10" width="88" height="24" fill="#0f1a2f" stroke="#27324a" stroke-width="2"/>
          <text class="t" x="194" y="36" font-size="12" font-weight="800">JS/CSS</text>
        </g>
      </g>

      <g transform="translate(342,0)">
        <text class="t muted" x="0" y="0" font-size="14" font-weight="800" dominant-baseline="hanging">Interviews</text>
        <rect x="0" y="30" rx="16" ry="16" width="318" height="404" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>
        <g transform="translate(16,54)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="108"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">TaskEvents</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">Schedule per ticket • TZ support</text>
          <g transform="translate(14,74)">
            <circle class="b" cx="10" cy="10" r="7"/>
            <text class="t muted" x="28" y="14" font-size="12" font-weight="800">Teams / Slack reminders</text>
          </g>
        </g>
        <g transform="translate(16,182)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="108"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">Artifacts</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">OneDrive / Drive tabs</text>
          <g transform="translate(14,74)">
            <circle class="k" cx="10" cy="10" r="7"/>
            <text class="t muted" x="28" y="14" font-size="12" font-weight="800">FFmpeg processing</text>
          </g>
        </g>
      </g>

      <g transform="translate(684,0)">
        <text class="t muted" x="0" y="0" font-size="14" font-weight="800" dominant-baseline="hanging">Feedback</text>
        <rect x="0" y="30" rx="16" ry="16" width="318" height="404" fill="#0b1220" stroke="#1f2a44" stroke-width="2"/>
        <g transform="translate(16,54)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="120"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">NexiusTheme</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">Transcripts + summaries</text>
          <g transform="translate(14,76)">
            <circle class="p" cx="10" cy="10" r="7"/>
            <text class="t muted" x="28" y="14" font-size="12" font-weight="800">Gemini consolidated summary</text>
          </g>
        </g>
        <g transform="translate(16,198)">
          <rect class="card" x="0" y="0" rx="14" ry="14" width="286" height="88"/>
          <text class="t" x="14" y="28" font-size="16" font-weight="800">API Sync</text>
          <text class="t muted" x="14" y="54" font-size="13" font-weight="700">Request logging • HTML images</text>
        </g>
      </g>
    </g>

    <!-- Footer note -->
    <g transform="translate(24,528)">
      <text class="t muted" x="0" y="0" font-size="13" font-weight="700" dominant-baseline="hanging">Optimized board DnD and lazy-loaded ticket details for faster navigation.</text>
    </g>
  </g>
</svg>

